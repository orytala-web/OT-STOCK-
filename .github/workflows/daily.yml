name: Daily TASE Scanner

on:
  schedule:
    # הגדרה לריצה אוטומטית: ימים א'-ה' בשעה 17:30 שעון ישראל
    - cron: '30 15 * * 0-4'
  workflow_dispatch: # מאפשר לך להריץ ידנית מתי שבא לך

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4 # התיקון כאן
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests numpy

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py


