name: Global Stock Scanner

on:
  schedule:
    # 21:30 UTC = 23:30 שעון ישראל (א'-ה')
    - cron: '30 21 * * 0-4'
  workflow_dispatch: # מאפשר לך להריץ ידנית בכל רגע

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests numpy

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py



