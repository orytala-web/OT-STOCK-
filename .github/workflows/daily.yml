name: Daily TASE Scanner

on:
  schedule:
    # ירוץ בימים ראשון עד חמישי בשעה 17:30 (זמן ישראל זה 15:30 UTC)
    - cron: '30 15 * * 0-4'
  workflow_dispatch: # מאפשר לך עדיין להריץ ידנית אם תרצה

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/color-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests numpy

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scanner.py

